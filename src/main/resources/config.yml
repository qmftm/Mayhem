# Asurajang 설정 파일

augment:
  # ── 증강 표시 정보 (이름·아이콘·색상·설명) ─────────────────────────────────
  description:
    FeatherFalling:
      display-name: "가벼운 착지"
      icon: FEATHER
      color: white
      description:
        - "낙하 피해를 받지 않습니다."

    StrongStrong:
      display-name: "강강약약"
      icon: NETHER_STAR
      color: gold
      description:
        - "가장 킬 수가 높은 적에게 1.5배의 피해를 줍니다."

    StrongWeak:
      display-name: "강약약강"
      icon: WITHER_ROSE
      color: red
      description:
        - "상대에게 (50 - 상대의 체력 비율)% 만큼의 추가 피해를 줍니다"

    MolaMola:
      display-name: "개복치"
      icon: PUFFERFISH
      color: aqua
      description:
        - "최대체력이 절반 감소합니다."
        - "적을 때릴 때마다 10% 확률로 능력을 이전 시킵니다."

    DivergentFist:
      display-name: "경정권"
      icon: NAUTILUS_SHELL
      color: aqua
      description:
        - "공격 시 80%의 피해를 준 뒤"
        - "0.5초 후 40%의 피해와 2배의 넉백을 추가로 줍니다."
        - "쿨타임: 15초"

    ColdBlood:
      display-name: "냉혈한"
      icon: SNOWBALL
      color: aqua
      description:
        - "적을 우클릭하면 해당 대상에게 구속과 나약함을 3초간 부여합니다."
        - "쿨타임: 45초"

    Deadful:
      display-name: "데드풀"
      icon: FERMENTED_SPIDER_EYE
      color: red
      description:
        - "최대 체력이 5칸으로 고정되며"
        - "1초마다 즉시 치유 I를 받습니다."

    Copy:
      display-name: "모방"
      icon: MAGENTA_DYE
      color: light_purple
      description:
        - "적을 죽일 시 적의 증강 중 하나를 복사합니다."
        - "3회 복사 후 이 증강이 사라집니다."

    Hentai:
      display-name: "변태"
      icon: ARMOR_STAND
      color: yellow
      description:
        - "적을 때릴 때마다 3% 확률로 갑옷 부위를 벗깁니다."

    BoogieWoogie:
      display-name: "부기우기"
      icon: SHEARS
      color: light_purple
      description:
        - "양손 맞바꾸기 키로 20블록 내의"
        - "가장 가까운 적과 위치를 교환합니다."
        - "쿨타임: 5초"

    Unbreakable:
      display-name: "불괴"
      icon: BEDROCK
      color: dark_gray
      description:
        - "아이템의 내구도가 소모될 때 75% 확률로 소모되지 않습니다."

    Immortal:
      display-name: "불멸"
      icon: TOTEM_OF_UNDYING
      color: gold
      description:
        - "사망 시 35%의 확률로 부활합니다."
        - "부활 시 전체 체력의 절반인 상태로 부활하며"
        - "죽은 위치의 10칸 이내에 랜덤한 좌표에서 부활합니다."

    WindBurst:
      display-name: "붕뜨네"
      icon: WIND_CHARGE
      color: aqua
      description:
        - "검 우클릭 시 바라보는 방향으로 돌풍구를 날립니다."
        - "쿨타임: 20초"

    DivineDogs:
      display-name: "옥견"
      icon: WOLF_SPAWN_EGG
      color: white
      description:
        - "두 마리의 길들인 늑대가 당신을 도와 싸웁니다."
        - "늑대는 사망 시 60초 후에 부활합니다."
        - "당신이 사망하면 늑대도 같이 사라지며 같이 부활합니다."

    GlassCannon:
      display-name: "유리 대포"
      icon: GLASS_BOTTLE
      color: white
      description:
        - "최대 체력이 30% 감소합니다."
        - "주는 대미지의 15%를 추가로 입힙니다."

    HeavyForce:
      display-name: "육중한 힘"
      icon: IRON_AXE
      color: gray
      description:
        - "공격력이 20% 증가합니다."

    SelfBomber:
      display-name: "자폭"
      icon: TNT
      color: red
      description:
        - "35초마다 머리 위에 TNT가 부착됩니다."
        - "부착 시 5초 간 신속을 받은 뒤 폭발하며"
        - "반경 8칸 내 적에게 최대 체력의 20%로 고정 피해를 줍니다."
        - "자신은 그 피해의 50%만 받습니다."
        - "폭탄 보유 중 사망하면 즉시 폭발합니다."

    SniperDuel:
      display-name: "저격 대결"
      icon: BOW
      color: yellow
      description:
        - "12칸 이상 거리의 적을 공격 시"
        - "피해가 50% 증가합니다."

    GuiltPleasure:
      display-name: "죄책감의 쾌락"
      icon: REDSTONE
      color: red
      description:
        - "적 플레이어를 처치 시 최대 체력의 20%를 회복합니다."

    DivineLove:
      display-name: "주님의 사랑"
      icon: BLAZE_POWDER
      color: gold
      description:
        - "검 우클릭 시 바라보는 방향으로"
        - "화염구를 3회 연달아 날립니다."
        - "쿨타임: 25초"

    CleanUp:
      display-name: "클린업"
      icon: SUGAR
      color: white
      description:
        - "체력 30% 이하인 적이 10칸 내에 있으면"
        - "이동 속도가 50% 증가합니다."

    SaturatedFat:
      display-name: "포화지방산"
      icon: COOKED_PORKCHOP
      color: yellow
      description:
        - "배고픔이 소모되지 않습니다."
        - "음식을 먹을 때마다 즉시 치유 효과를 받습니다."

    BlackFlash:
      display-name: "흑섬"
      icon: OBSIDIAN
      color: dark_gray
      description:
        - "공격마다 3% 확률로 2.5배의 피해를 줍니다."
        - "발동 후 3번의 공격 동안 확률이 증가합니다."

  # ── 증강 수치 설정 (확률·피해량·쿨타임 등) ─────────────────────────────────
  setting:
    StrongStrong:
      damage-multiplier: 1.5

    StrongWeak:
      threshold-percent: 50.0
      high-health-multiplier: 0.5
      low-health-bonus-scale: 100.0

    MolaMola:
      max-health-fixed: 0.5
      transfer-chance: 0.10

    DivergentFist:
      cooldown-ms: 15000
      first-hit-multiplier: 0.8
      second-hit-multiplier: 0.4
      delay-ticks: 10
      knockback-multiplier: 2.0

    ColdBlood:
      cooldown-ms: 45000
      slowness-duration: 60
      slowness-amplifier: 3
      weakness-duration: 60
      weakness-amplifier: 0

    Deadful:
      max-health-fixed: 0.5
      heal-interval-ticks: 20

    Copy:
      max-copies: 3

    Hentai:
      strip-chance: 0.03
      particle-count-base: 10
      particle-count-random: 6

    BoogieWoogie:
      range: 20.0
      cooldown-ms: 5000

    Unbreakable:
      negate-chance: 0.75

    Immortal:
      revive-chance: 0.35
      revive-radius: 10.0
      revive-health-fraction: 0.5

    WindBurst:
      cooldown-ms: 20000
      velocity-multiplier: 2.5

    DivineDogs:
      respawn-delay-ticks: 1200

    GlassCannon:
      max-health-multiplier: 0.7
      damage-multiplier: 1.15

    HeavyForce:
      damage-multiplier: 1.2

    SelfBomber:
      bomb-interval-ticks: 700
      fuse-seconds: 5
      radius: 8.0
      damage-fraction: 0.2
      self-damage-multiplier: 0.5
      knockback-horizontal: 1.5
      knockback-vertical: 0.4

    SniperDuel:
      min-distance: 12.0
      damage-multiplier: 1.5

    GuiltPleasure:
      heal-fraction: 0.2

    DivineLove:
      cooldown-ms: 25000
      fireball-count: 3
      spacing-ticks: 7
      velocity-multiplier: 1.5

    CleanUp:
      range: 10.0
      health-threshold: 0.3
      speed-bonus: 0.5
      check-interval-ticks: 4

    SaturatedFat:
      fixed-food-level: 19

    BlackFlash:
      streak-chances: [0.36, 0.18, 0.06]
      base-chance: 0.03
      streak-reset: 3
      damage-multiplier: 2.5
      knockback-multiplier: 4.0

# ── 기지 모드(거점·가디언) 설정 ───────────────────────────────────────────────
nexus:
  guardian:
    life-health: [200.0, 300.0, 400.0]   # 라이프 1~3회차 체력 (회복할수록 늘어남)
    recovery-seconds: 20                  # 체력 소진 후 공격 불가 + 회복까지 걸리는 시간
    aggro-range: 16.0                     # 적팀 탐지 범위 (블록)
    projectile-damage: 5.0                # 투사체 1회 명중 피해량
    projectile-speed: 1.1                 # 투사체 이동 속도 (블록/틱)
    projectile-hit-radius: 1.0            # 명중 판정 반경
    projectile-max-life-ticks: 100        # 투사체 최대 생존 시간 (틱)
    attack-tick-period: 5                 # 공격 루프가 표적·쿨다운을 점검하는 주기 (틱)
    attack-interval-ticks: [65, 45, 28]   # 라이프 단계별 공격 주기 (라이프가 회복될수록 더 빨라짐)
