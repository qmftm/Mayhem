# 프리즘 증강 표시 정보 (이름·아이콘·색상·설명)
# 형식은 augment/description.yml과 동일합니다.
# active: true 이면 아이템 지급 후 우클릭 발동 / false(기본) 이면 즉시 패시브 발동

ExecutionerSword:
  display-name: "처형인의 검"
  icon: GOLDEN_SWORD
  color: yellow
  cooldown: 299
  description:
    - "내구도가 1이지만 높은 날카로움 수치를 가진 금 검을 즉시 지급합니다."
    - "검이 깨지면 299초 후 자동으로 다시 지급됩니다."

Dropkick:
  display-name: "드롭킥"
  icon: RABBIT_FOOT
  color: red
  active: false
  description:
    - "근접 공격 시 체력 15% 이하인 적을 즉사시킵니다."
    - "즉사한 적에게 강한 넉백과 폭발이 발생하며,"
    - "자신의 체력을 최대 체력의 50% 회복합니다."

GlassCannon:
  display-name: "유리 대포"
  icon: GLASS
  color: white
  description:
    - "최대 체력이 30% 감소합니다."
    - "공격 시 15%의 추가 고정 피해를 입힙니다."

TabDancer:
  display-name: "탭 댄서"
  icon: JUKEBOX
  color: aqua
  description:
    - "기본 공격 시 무한히 중첩되는 0.02의 이동 속도를 얻습니다."
    - "마지막 중첩을 쌓은 후 5초 이내로 중첩을 쌓지 않으면"
    - "중첩이 빠르게 감소합니다."
