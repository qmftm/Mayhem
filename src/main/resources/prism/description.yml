# 프리즘 증강 표시 정보 (이름·아이콘·색상·설명)
# 형식은 augment/description.yml과 동일합니다.
# active: true 이면 아이템 지급 후 우클릭 발동 / false(기본) 이면 즉시 패시브 발동

ExecutionerSword:
  display-name: "처형인의 검"
  icon: GOLDEN_SWORD
  color: yellow
  cooldown: 299
  description:
    - "<yellow>내구도 1</yellow>, 높은 날카로움의"
    - "금 검을 즉시 지급합니다."
    - "검이 깨지면 <yellow>299초</yellow> 후"
    - "자동으로 다시 지급됩니다."

Dropkick:
  display-name: "드롭킥"
  icon: RABBIT_FOOT
  color: red
  description:
    - "근접 공격 시 체력 <red>15%</red> 이하인"
    - "적을 <red>즉사</red>시킵니다."
    - "즉사한 적에게 <red>강한 넉백</red>과"
    - "<red>폭발</red>이 발생하며"
    - "자신의 체력을 최대 체력의"
    - "<red>50%</red> 회복합니다."

GlassCannon:
  display-name: "유리 대포"
  icon: GLASS
  color: white
  description:
    - "최대 체력이 <white>30%</white> 감소합니다."
    - "공격 시 <white>15%</white>의"
    - "추가 고정 피해를 입힙니다."

StatPlusPlusPlus:
  display-name: "능력치 더하기 더하기 더하기"
  icon: SMITHING_TABLE
  color: dark_purple
  description:
    - "능력치 모루 <dark_purple>4개</dark_purple>를 획득합니다!"

TabDancer:
  display-name: "탭 댄서"
  icon: JUKEBOX
  color: aqua
  description:
    - "기본 공격 시 <aqua>0.02</aqua>의 이동 속도를"
    - "무한히 중첩하여 얻습니다."
    - "마지막 중첩 후 <aqua>5초</aqua> 이내"
    - "중첩을 쌓지 않으면"
    - "중첩이 빠르게 감소합니다."

InfiniteGold:
  display-name: "무한한 골드"
  icon: GOLD_BLOCK
  color: gold
  description:
    - "골드를 <gold>32767</gold>로 변경합니다."
    - "단, 부활 시간이 <gold>5배</gold> 증가하며"
    - "주는 피해량이 <gold>10%</gold> 감소합니다."

Aegis:
  display-name: "이지스"
  icon: CLOCK
  color: gold
  active: true
  cooldown: 80
  description:
    - "아이템을 우클릭하면"
    - "<gold>4초간</gold> 모든 피해를 무시하는"
    - "<gold>무적</gold> 상태가 됩니다."
    - "<gold>쿨타임: 80초</gold>"

Seal:
  display-name: "봉인"
  icon: IRON_BARS
  color: gray
  active: true
  cooldown: 120
  description:
    - "아이템을 우클릭하면 주변 <gray>10칸</gray>의"
    - "플레이어에게 <gray>9초간</gray> <gray>몰수</gray>"
    - "효과를 부여합니다."
    - ""
    - "<gray>몰수</gray>: 모든 증강 사용이"
    - "금지되며 공격력이 <gray>10%</gray> 감소합니다."
    - "<gray>쿨타임: 120초</gray>"

InevitableExistence:
  display-name: "필연적인 존재"
  icon: HONEYCOMB
  color: gold
  description:
    - "적을 처치할 때마다 <gold>50%</gold> 확률로"
    - "랜덤한 스톤을 획득합니다."
    - "<gold>6종</gold>의 스톤을 모두 모은 뒤"
    - "건틀릿을 우클릭하면 <red>1회</red>에 한해"
    - "모든 적을 <red>즉사</red>시키고"
    - "모든 스톤이 소멸합니다."
    - ""
    - "<light_purple>파워 스톤</light_purple>: 공격력 +100%"
    - "<blue>스페이스 스톤</blue>: 이동 속도 +100%"
    - "<red>리얼리티 스톤</red>: 투명화"
    - "<gold>소울 스톤</gold>: 공격의 50% 고정 피해"
    - "<green>타임 스톤</green>: 공격 속도 +50%"
    - "<yellow>마인드 스톤</yellow>: 공격 시 5초간 매혇"
    - ""
    - "<gray>(스톤 효과는 왼손에 들고 있을 때만 발동)</gray>"

NanoTechnology:
  display-name: "나노 테크놀로지"
  icon: GHAST_TEAR
  color: aqua
  description:
    - "적을 처치할 때마다 적의 최대 체력의"
    - "<aqua>절반</aqua>만큼 <aqua>흡수 체력</aqua>을"
    - "얻습니다. (<aqua>중첩됨</aqua>)"
