# 프리즘 증강 표시 정보 (이름·아이콘·색상·설명)
# 형식은 augment/description.yml과 동일합니다.
# active: true 이면 아이템 지급 후 우클릭 발동 / false(기본) 이면 즉시 패시브 발동

ExecutionerSword:
  display-name: "처형인의 검"
  icon: GOLDEN_SWORD
  color: yellow
  cooldown: 299
  description:
    - "<yellow>내구도 1</yellow>, 높은 날카로움의"
    - "금 검을 즉시 지급합니다."
    - "검이 깨지면 <yellow>299초</yellow> 후"
    - "자동으로 다시 지급됩니다."

Dropkick:
  display-name: "드롭킥"
  icon: RABBIT_FOOT
  color: red
  active: false
  description:
    - "근접 공격 시 체력 <red>15%</red> 이하인"
    - "적을 <red>즉사</red>시킵니다."
    - "즉사한 적에게 <red>강한 넉백</red>과"
    - "<red>폭발</red>이 발생하며"
    - "자신의 체력을 최대 체력의"
    - "<red>50%</red> 회복합니다."

GlassCannon:
