# 시너지 증강 설정
# 형식:
# SynergyId:                    ← AugmentationRegistry에 등록된 효과 ID
#   components:                 ← 필요한 증강 ID 목록 (모두 보유 시 자동 발동)
#     - AugId1
#     - AugId2
#   display-name: "이름"
#   icon: MATERIAL_NAME
#   color: color_name           ← aqua / red / gold / dark_purple 등 NamedTextColor
#   description:
#     - "설명 줄 1 (MiniMessage 형식)"

FiercePursuer:
  components:
    - Pursuer
    - HuntingInstinct
  display-name: "맹추"
  icon: CROSSBOW
  color: dark_red
  description:
    - "추격자와 사냥 본능이 합쳐졌습니다."
    - "같은 적 연속 공격 시 피해 <dark_red>7%</dark_red>씩 증가 (최대 <dark_red>70%</dark_red>),"
    - "처치 후 <dark_red>8초</dark_red>간 추가 피해 <dark_red>50%</dark_red>."
